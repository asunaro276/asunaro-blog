<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#0c0c0e; color:#e9e6df; font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  .theme-light {
    /* Warm paper with a faint green-yellow undertone — pairs with forest accent */
    --bg: oklch(0.985 0.008 110);
    --bg-2: oklch(0.96 0.012 115);
    --bg-3: oklch(0.92 0.016 120);
    --fg: oklch(0.28 0.020 145);
    --fg-2: oklch(0.44 0.020 140);
    --fg-3: oklch(0.60 0.018 135);
    --rule: oklch(0.88 0.014 120);
    --rule-2: oklch(0.80 0.018 125);
    --accent: oklch(0.46 0.09 155);
    --tint: oklch(0.955 0.020 140);
  }
  .theme-dark {
    /* Deep forest-tinged near-black with sage accent for harmony */
    --bg: oklch(0.17 0.012 150);
    --bg-2: oklch(0.21 0.014 150);
    --bg-3: oklch(0.27 0.016 148);
    --fg: oklch(0.94 0.010 130);
    --fg-2: oklch(0.78 0.014 135);
    --fg-3: oklch(0.60 0.018 140);
    --rule: oklch(0.30 0.014 145);
    --rule-2: oklch(0.38 0.018 145);
    --accent: oklch(0.78 0.10 145);
    --tint: oklch(0.24 0.020 145);
  }
  .surface { background: var(--bg); color: var(--fg); }
  .label { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-3); font-weight: 500; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .ja  { font-family: 'Noto Sans JP', sans-serif; }
  .ja-serif { font-family: 'Noto Serif JP', serif; }
  .ph {
    background:
      repeating-linear-gradient(135deg, var(--rule) 0 1px, transparent 1px 8px),
      var(--bg-2);
    color: var(--fg-3);
    display: grid; place-items:center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.05em;
  }
  .avatar {
    background:
      radial-gradient(circle at 50% 45%, var(--bg-3) 0 22%, transparent 23%),
      repeating-linear-gradient(135deg, var(--rule) 0 1px, transparent 1px 6px),
      var(--bg-2);
    border-radius: 999px;
  }
</style>
</head>

<div id="root"></div>
